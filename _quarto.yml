project:
  type: website
  output-dir: docs

website:
  title: "VedicDateTime"
  description: "An R package to implement the Vedic (lunisolar) calendar system and convert Gregorian/Julian dates to Vedic calendar entities (Panchanga)."
  site-url: "https://neerajdhanraj.github.io/VedicDateTime/"  # GitHub Pages URL
  repo-url: "https://github.com/neerajdhanraj/VedicDateTime"
  repo-actions: [issue]
  favicon: "assets/VedicDateTimeLOGO2.png"

  navbar:
    logo: "assets/VedicDateTimeLOGO2.png"
    left:
      - href: index.qmd
        text: Home
      - text: Docs
        menu:
          - href: getting-started.qmd
            text: Getting started
          - href: cookbook.qmd
            text: Cookbook
          - href: accuracy.qmd
            text: Accuracy & conventions
          - href: reference.qmd
            text: Reference (overview)
          - href: pkgdown/
            text: API (pkgdown)
          - href: articles.qmd
            text: Tutorials & case studies
      - href: roadmap.qmd
        text: Roadmap & AI
      - text: More
        menu:
          - href: publications.qmd
            text: Publication
          - href: contributing.qmd
            text: Contributing
          - href: development.qmd
            text: Development
          - href: faq.qmd
            text: FAQ
          - href: about.qmd
            text: About
          - href: changelog.qmd
            text: Changelog
          - href: contact.qmd
            text: Contact
    right:
      - text: CRAN
        href: "https://cran.r-project.org/package=VedicDateTime"
      - icon: github
        href: "https://github.com/neerajdhanraj/VedicDateTime"

  page-footer:
    left: "© {year} VedicDateTime contributors"
    right:
      - text: "CRAN"
        href: "https://cran.r-project.org/package=VedicDateTime"
      - text: "GitHub"
        href: "https://github.com/neerajdhanraj/VedicDateTime"
      - text: "Contact"
        href: contact.qmd

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    code-copy: true
    anchor-sections: true
    link-external-icon: true
    link-external-newwindow: true

execute:
  freeze: auto
  eval: false
